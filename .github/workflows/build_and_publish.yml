name: Build and publish to PyPI

on:
  push:
    branches:
      - main
      - dev
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Test pip install from built wheel
        run: |
          pip install dist/*.whl
          longhap --help
          longhap --version

      - name: Test conda install from source
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: longhap
          environment-file: longhap.yaml
          conda-remove-defaults: "true"

      - name: Test longhap via conda environment
        shell: bash -el {0}
        run: |
          conda activate longhap
          ./longhap.py --help
          ./longhap.py --version

      - name: Upload build artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    if: github.event_name == 'release'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  test-uvx:
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Test uvx longhap
        run: uvx longhap --help
